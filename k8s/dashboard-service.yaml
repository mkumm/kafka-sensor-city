apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
        - name: dashboard-service
          image: dashboard-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef:
                  name: kafka-config
                  key: bootstrap-servers
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: kafka
spec:
  selector:
    app: dashboard-service
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
